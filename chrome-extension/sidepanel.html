<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Browser Agent</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <!-- ─── Header ──────────────────────────────────────────────────── -->
  <header class="claude-header">
    <div class="model-selector-wrap">
      <button id="modelDropdownBtn" class="model-dropdown-btn" type="button">
        <span id="currentModelName">Pollinations (Free)</span>
        <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 9l6 6 6-6"/>
        </svg>
      </button>

      <!-- Model Picker Popover (Matches Claude's menu) -->
      <div id="modelPopover" class="model-popover hidden">
        <div class="popover-group-label">FREE MODELS (NO KEY NEEDED)</div>
        <button class="model-option active" data-provider="pollinations" data-model="openai">
          <div class="model-option-info">
            <span class="model-title">Pollinations (OpenAI)</span>
            <span class="model-desc">Fastest free model, no setup required</span>
          </div>
          <svg class="check-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        </button>

        <button class="model-option" data-provider="opencode" data-model="opencode/north-mini-code-free">
          <div class="model-option-info">
            <span class="model-title">OpenCode North Mini</span>
            <span class="model-desc">Free no-key coding/browser agent model</span>
          </div>
          <svg class="check-icon hidden" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        </button>

        <button class="model-option" data-provider="opencode" data-model="opencode/deepseek-v4-flash-free">
          <div class="model-option-info">
            <span class="model-title">OpenCode DeepSeek Flash</span>
            <span class="model-desc">Free no-key DeepSeek-style model</span>
          </div>
          <svg class="check-icon hidden" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        </button>

        <button class="model-option" data-provider="opencode" data-model="openrouter/qwen/qwen3-coder:free">
          <div class="model-option-info">
            <span class="model-title">OpenCode Qwen Coder</span>
            <span class="model-desc">Free Qwen Coder via OpenCode gateway</span>
          </div>
          <svg class="check-icon hidden" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        </button>

        <div class="popover-group-label">FREE TIER (API KEY REQUIRED)</div>
        <button class="model-option" data-provider="gemini" data-model="gemini-2.0-flash">
          <div class="model-option-info">
            <span class="model-title">Google Gemini 2.0 Flash</span>
            <span class="model-desc">Best performance on free tier</span>
          </div>
          <svg class="check-icon hidden" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        </button>

        <button class="model-option" data-provider="openrouter" data-model="meta-llama/llama-3.3-8b-instruct:free">
          <div class="model-option-info">
            <span class="model-title">OpenRouter (Llama 3.3 Free)</span>
            <span class="model-desc">Free open models via OpenRouter key</span>
          </div>
          <svg class="check-icon hidden" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        </button>

        <button class="model-option" data-provider="openrouter" data-model="qwen/qwen-2.5-7b-instruct:free">
          <div class="model-option-info">
            <span class="model-title">OpenRouter Qwen 2.5 Free</span>
            <span class="model-desc">Free Qwen model via OpenRouter key</span>
          </div>
          <svg class="check-icon hidden" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        </button>

        <button class="model-option" data-provider="openrouter" data-model="deepseek/deepseek-chat-v3-0324:free">
          <div class="model-option-info">
            <span class="model-title">OpenRouter DeepSeek V3 Free</span>
            <span class="model-desc">Free DeepSeek model via OpenRouter key</span>
          </div>
          <svg class="check-icon hidden" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        </button>

        <button class="model-option" data-provider="openrouter" data-model="qwen/qwen3-coder:free">
          <div class="model-option-info">
            <span class="model-title">OpenRouter Qwen3 Coder Free</span>
            <span class="model-desc">Free coder model via OpenRouter key</span>
          </div>
          <svg class="check-icon hidden" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        </button>

        <button class="model-option" data-provider="openrouter" data-model="mistralai/mistral-7b-instruct:free">
          <div class="model-option-info">
            <span class="model-title">OpenRouter Mistral 7B Free</span>
            <span class="model-desc">Reliable free instruct model via OpenRouter key</span>
          </div>
          <svg class="check-icon hidden" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        </button>

        <button class="model-option" data-provider="openrouter" data-model="google/gemma-2-9b-it:free">
          <div class="model-option-info">
            <span class="model-title">OpenRouter Gemma 2 9B Free</span>
            <span class="model-desc">Free Google open model via OpenRouter key</span>
          </div>
          <svg class="check-icon hidden" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        </button>

        <div class="popover-group-label">LOCAL MODELS</div>
        <button class="model-option" data-provider="ollama" data-model="llama3.1">
          <div class="model-option-info">
            <span class="model-title">Ollama Local</span>
            <span class="model-desc">Runs 100% offline on your computer</span>
          </div>
          <svg class="check-icon hidden" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        </button>

        <div class="popover-divider"></div>
        <button id="openFullSettingsBtn" class="model-option settings-link">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
          <span>More Providers & Keys...</span>
        </button>
      </div>
    </div>

    <div class="header-right-actions">
      <button id="newChat" class="icon-btn-ghost" type="button" title="New Chat">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      </button>
      <button id="settingsToggle" class="icon-btn-ghost" type="button" title="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
      </button>
    </div>
  </header>

  <!-- ─── Full Settings Drawer (Slide-down overlay) ──────────────── -->
  <section id="settings" class="settings-drawer hidden">
    <div class="drawer-header">
      <span>Provider & Key Configuration</span>
      <button id="closeSettings" class="icon-btn-ghost" type="button">✕</button>
    </div>
    <div class="settings-group">
      <label>
        Provider
        <select id="provider">
          <option value="pollinations">Pollinations AI (free, no key)</option>
          <option value="opencode">OpenCode AI (free, no key)</option>
          <option value="gemini">Google Gemini (free tier key)</option>
          <option value="openrouter">OpenRouter (free/paid)</option>
          <option value="ollama">Ollama (local)</option>
          <option value="lmstudio">LM Studio (local)</option>
          <option value="anthropic">Anthropic Claude</option>
          <option value="openai">OpenAI</option>
          <option value="custom">Custom Endpoint</option>
        </select>
      </label>
      <label>
        Model Name
        <input id="model" type="text" placeholder="auto" list="modelPresets">
        <datalist id="modelPresets">
          <option value="openai">
          <option value="opencode/north-mini-code-free">
          <option value="opencode/deepseek-v4-flash-free">
          <option value="opencode/nemotron-3-ultra-free">
          <option value="opencode/mimo-v2.5-free">
          <option value="openrouter/qwen/qwen3-coder:free">
          <option value="meta-llama/llama-3.3-8b-instruct:free">
          <option value="qwen/qwen-2.5-7b-instruct:free">
          <option value="qwen/qwen3-coder:free">
          <option value="deepseek/deepseek-chat-v3-0324:free">
          <option value="mistralai/mistral-7b-instruct:free">
          <option value="google/gemma-2-9b-it:free">
          <option value="gemini-2.0-flash">
          <option value="llama3.1">
        </datalist>
      </label>
      <label id="endpointRow" class="hidden">
        Endpoint URL
        <input id="endpoint" type="url" placeholder="http://localhost:11434/api/chat">
      </label>
      <label id="apiKeyRow" class="hidden">
        API Key
        <input id="apiKey" type="password" placeholder="sk-...">
      </label>
      <label>
        Max Auto Steps
        <select id="maxSteps">
          <option value="5">5 steps</option>
          <option value="10" selected>10 steps</option>
          <option value="20">20 steps</option>
          <option value="50">50 steps</option>
        </select>
      </label>
    </div>
    <button id="saveSettings" class="btn-primary-full" type="button">Save Settings</button>
  </section>

  <!-- ─── Status Indicator ────────────────────────────────────────── -->
  <div id="statusLine" class="status-bar">Ready</div>

  <!-- ─── Chat Messages Container ────────────────────────────────── -->
  <main id="messages" class="messages" aria-live="polite"></main>

  <!-- ─── Action Approval Panel ───────────────────────────────────── -->
  <section id="approval" class="approval hidden">
    <div class="approval-header">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 9v4M12 17h.01"/><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>
      <span>Approval Required</span>
    </div>
    <div id="approvalActions" class="approval-list"></div>
    <div class="approval-buttons">
      <button id="approveBtn" type="button" class="btn-approve">Approve & Run</button>
      <button id="declineBtn" type="button" class="btn-decline">Decline</button>
    </div>
  </section>

  <!-- ─── Composer (Matches Claude extension bottom box) ────────── -->
  <div class="composer-container">
    <form id="composer" class="claude-composer">
      <textarea id="prompt" rows="1" placeholder="Type / for commands"></textarea>

      <div class="composer-bottom-bar">
        <div class="composer-left-controls">
          <!-- Inline permission toggle like Claude's "Act without asking ∨" -->
          <button id="permissionToggleBtn" class="permission-toggle-btn" type="button">
            <svg class="act-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
            </svg>
            <span id="permissionLabel">Act without asking</span>
            <svg class="chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
          </button>

          <!-- Hidden select for compatibility -->
          <select id="permissionMode" class="hidden">
            <option value="auto-all">auto-all</option>
            <option value="auto-low">auto-low</option>
            <option value="ask">ask</option>
          </select>
        </div>

        <div class="composer-right-controls">
          <!-- Sparkle icon button -->
          <button id="refreshPage" class="icon-btn-subtle" type="button" title="Scan & Read Page">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/>
            </svg>
          </button>

          <!-- Plus icon button -->
          <button id="quickQuizBtn" class="icon-btn-subtle" type="button" title="Solve Quiz Page">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </button>

          <!-- Send button (Claude-style orange circle with up arrow) -->
          <button id="send" type="submit" class="claude-send-btn" title="Send message">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
            </svg>
          </button>

          <!-- Stop button -->
          <button id="stop" class="claude-stop-btn hidden" type="button" title="Stop">
            <rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor"/>
          </button>
        </div>
      </div>
    </form>

    <!-- Disclaimer (Exact match to Claude's footer) -->
    <div class="disclaimer-footer">
      Browser Agent is AI and can make mistakes. Please double-check responses.
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
